{% extends "base.html" %}
{% block title %}{{ title }} - ReceiptHub{% endblock %}
{% block content %}
<section class="auth-card wide">
    <h1>{{ title }}</h1>
    <form method="post" class="stack">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit" class="button primary">保存</button>
            <a href="{% url 'dashboard' %}" class="button">戻る</a>
        </div>
    </form>
</section>
{% endblock %}
