{% extends "base.html" %}
{% block title %}{{ title }} - ReceiptHub{% endblock %}
{% block content %}
<section class="auth-card wide">
    <h1>{{ title }}</h1>
    {% if managed_user %}<p class="muted">対象ユーザー: <strong>{{ managed_user.username }}</strong></p>{% endif %}
    <form method="post" class="stack">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit" class="button primary">{{ submit_label|default:"保存" }}</button>
            <a href="{{ back_url }}" class="button">戻る</a>
        </div>
    </form>
</section>
{% endblock %}
