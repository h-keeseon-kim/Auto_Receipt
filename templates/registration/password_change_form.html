{% extends "base.html" %}
{% block title %}パスワード変更 - Auto Receipt{% endblock %}
{% block content %}
<section class="auth-card wide">
    <h1>パスワード変更</h1>
    <p class="muted">初期パスワードのままでは機能を利用できません。新しいパスワードを設定してください。</p>
    <form method="post" class="stack">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button primary">パスワードを変更する</button>
    </form>
</section>
{% endblock %}
