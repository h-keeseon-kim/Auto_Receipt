{% extends "base.html" %}
{% block title %}ログイン - Auto Receipt{% endblock %}
{% block content %}
<section class="auth-card">
    <h1>ログイン</h1>
    <form method="post" class="stack">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button primary">ログイン</button>
    </form>
    <p class="muted">アカウントがない場合は <a href="{% url 'register' %}">登録</a> してください。</p>
</section>
{% endblock %}
