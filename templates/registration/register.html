{% extends "base.html" %}
{% block title %}ユーザー登録 - ReceiptHub{% endblock %}
{% block content %}
<section class="auth-card">
    <h1>ユーザー登録</h1>
    <form method="post" class="stack">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button primary">登録する</button>
    </form>
    <p class="muted">すでにアカウントがある場合は <a href="{% url 'login' %}">ログイン</a> してください。</p>
</section>
{% endblock %}
